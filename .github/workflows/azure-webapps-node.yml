rand               → rastgele sayı üretir
realloc            → belleği yeniden boyutlandırır
remove             → dosya siler
rename             → dosya adını değiştirir

scanf              → kullanıcıdan veri alır
sqrt               → karekök alır
srand              → rastgele sayı başlatır

strcat             → string birleştirir
strcmp             → string karşılaştırır
strcpy             → string kopyalar
strlen             → string uzunluğu verir
strstr             → alt string arar

system             → sistem komutu çalıştırır

time               → mevcut zamanı verir

tolower            → küçük harfe çevirir
toupper            → büyük harfe çevirir
