exit               → programı sonlandırır
exp                → e üzeri x hesaplar
fabs               → ondalıklı mutlak değer

fclose             → dosyayı kapatır
feof               → dosya sonuna gelindi mi kontrol eder
ferror             → dosya hatası var mı kontrol eder
fflush             → tamponu boşaltır
fgetc              → dosyadan karakter okur
fgets              → dosyadan string okur
