atexit             → program bitince çalışacak fonksiyon tanımlar

atof               → string → ondalıklı sayı çevirir
atoi               → string → tam sayı çevirir
atol               → string → long çevirir

bsearch            → ikili arama yapar
calloc             → bellek ayırır ve sıfırlar
ceil               → yukarı yuvarlar
